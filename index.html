<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测评系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            padding: 30px;
            margin: 20px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .score-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .score-item {
            text-align: center;
        }
        
        .score-label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #666;
        }
        
        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .score-slider {
            width: 100%;
            margin-top: 5px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            display: block;
            margin: 0 auto;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background: #f8f9fa;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .notification.success {
            background: #28a745;
        }
        
        .notification.error {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>测评系统</h1>
        
        <form id="surveyForm">
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" name="name" required placeholder="请输入您的姓名">
            </div>
            
            <div class="form-group">
                <label for="city">城市</label>
                <input type="text" id="city" name="city" placeholder="请输入您所在的城市">
            </div>
            
            <div class="form-group">
                <label for="store">门店</label>
                <input type="text" id="store" name="store" placeholder="请输入门店名称">
            </div>
            
            <h3 style="margin: 20px 0 15px; color: #333;">测评分数</h3>
            <div class="score-group">
                <div class="score-item">
                    <div class="score-label">O (开放性)</div>
                    <div class="score-value" id="scoreO">50</div>
                    <input type="range" class="score-slider" id="sliderO" min="0" max="100" value="50">
                </div>
                <div class="score-item">
                    <div class="score-label">C (尽责性)</div>
                    <div class="score-value" id="scoreC">50</div>
                    <input type="range" class="score-slider" id="sliderC" min="0" max="100" value="50">
                </div>
                <div class="score-item">
                    <div class="score-label">E (外向性)</div>
                    <div class="score-value" id="scoreE">50</div>
                    <input type="range" class="score-slider" id="sliderE" min="0" max="100" value="50">
                </div>
                <div class="score-item">
                    <div class="score-label">A (宜人性)</div>
                    <div class="score-value" id="scoreA">50</div>
                    <input type="range" class="score-slider" id="sliderA" min="0" max="100" value="50">
                </div>
                <div class="score-item">
                    <div class="score-label">S (稳定性)</div>
                    <div class="score-value" id="scoreS">50</div>
                    <input type="range" class="score-slider" id="sliderS" min="0" max="100" value="50">
                </div>
            </div>
            
            <div class="form-group">
                <label for="nps">NPS评分</label>
                <input type="number" id="nps" name="nps" min="-100" max="100" placeholder="请输入NPS评分（-100到100）">
            </div>
            
            <div class="form-group">
                <label for="level">等级</label>
                <select id="level" name="level">
                    <option value="">请选择等级</option>
                    <option value="优秀">优秀</option>
                    <option value="良好">良好</option>
                    <option value="一般">一般</option>
                    <option value="待改进">待改进</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="timeUsed">用时（分钟）</label>
                <input type="number" id="timeUsed" name="timeUsed" min="0" placeholder="请输入测评用时">
            </div>
            
            <div class="form-group">
                <label for="summary">总结</label>
                <textarea id="summary" name="summary" rows="4" placeholder="请输入测评总结"></textarea>
            </div>
            
            <button type="submit" class="btn">提交测评</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">正在提交数据...</p>
        </div>
        
        <div class="result" id="result"></div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        // 获取DOM元素
        const form = document.getElementById('surveyForm');
        const sliders = document.querySelectorAll('.score-slider');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const notification = document.getElementById('notification');
        
        // 云函数URL（已更新为最新URL）
        const FUNCTION_URL = 'https://1258853028-kjsuvn4gt0.ap-chengdu.tencentscf.com/';
        
        // 更新分数显示
        sliders.forEach(slider => {
            const scoreId = slider.id.replace('slider', 'score');
            const scoreElement = document.getElementById(scoreId);
            
            slider.addEventListener('input', () => {
                scoreElement.textContent = slider.value;
            });
        });
        
        // 显示通知
        function showNotification(message, type) {
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        // 提交表单
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 显示加载状态
            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            
            // 收集表单数据
            const formData = new FormData(form);
            const scores = {
                O: parseInt(document.getElementById('sliderO').value),
                C: parseInt(document.getElementById('sliderC').value),
                E: parseInt(document.getElementById('sliderE').value),
                A: parseInt(document.getElementById('sliderA').value),
                stability: parseInt(document.getElementById('sliderS').value)
            };
            
            const data = {
                name: formData.get('name'),
                city: formData.get('city'),
                store: formData.get('store'),
                scores: scores,
                nps: parseInt(formData.get('nps')) || 0,
                level: formData.get('level'),
                timeUsed: formData.get('timeUsed'),
                summary: formData.get('summary')
            };
            
            try {
                // 调用云函数
                const response = await fetch(FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3 style="margin-bottom: 10px;">提交成功！</h3>
                        <p>数据已成功保存到腾讯文档。</p>
                        <p style="margin-top: 10px; font-size: 14px; color: #666;">
                            提交时间: ${new Date().toLocaleString()}
                        </p>
                    `;
                    showNotification('提交成功！', 'success');
                } else {
                    throw new Error(result.error || '提交失败');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3 style="margin-bottom: 10px;">提交失败</h3>
                    <p>${error.message}</p>
                    <p style="margin-top: 10px; font-size: 14px; color: #666;">
                        请检查网络连接或联系管理员
                    </p>
                `;
                showNotification('提交失败，请重试', 'error');
            } finally {
                loadingDiv.style.display = 'none';
                resultDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
