    let userAnswers = new Array(questions.length).fill(null);

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateTimerDisplay() {
        if (!startTime) return;
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        if (timerElement) timerElement.innerText = formatTime(elapsed);
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        startTime = Date.now();
        timerInterval = setInterval(() => {
            if (timerRunning && startTime) updateTimerDisplay();
        }, 1000);
        updateTimerDisplay();
    }

    function resetTimer() {
        if (timerInterval) clearInterval(timerInterval);
        startTimer();
    }

    function getCurrentElapsedSeconds() {
        if (!startTime) return 0;
        return Math.floor((Date.now() - startTime) / 1000);
    }

    startTimer();

    const STORAGE_KEY = "skin79_bigfive_answers";
    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
    }
    function loadFromLocalStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed && parsed.length === questions.length) userAnswers = parsed;
            } catch(e) {}
        }
        if (userAnswers.length !== questions.length) userAnswers = new Array(questions.length).fill(null);
    }

    function updateProgressAndStats() {
        const answered = userAnswers.filter(v => v !== null).length;
        const percent = (answered / questions.length) * 100;
        const fill = document.getElementById('progressFill');
        const statsSpan = document.getElementById('progressStats');
        if (fill) fill.style.width = `${percent}%`;
        if (statsSpan) statsSpan.innerText = `${answered} / ${questions.length}`;
        const resultCard = document.getElementById('resultCard');
        if (resultCard && resultCard.style.display !== 'none' && currentResultVisible === true) {
            resultCard.style.display = 'none';
            currentResultVisible = false;
        }
    }

    function highlightSelected(qIndex, selectedVal) {
        const qDiv = document.querySelectorAll('.question-item')[qIndex];
        if (!qDiv) return;
        const labels = qDiv.querySelectorAll('.option-label');
        labels.forEach(label => {
            const radio = label.previousElementSibling;
            if (radio && parseInt(radio.value) === selectedVal) label.classList.add('selected');
            else label.classList.remove('selected');
        });
    }

    function setAnswer(qIndex, value) {
        if (userAnswers[qIndex] === value) return;
        userAnswers[qIndex] = value;
        highlightSelected(qIndex, value);
        updateProgressAndStats();
        saveToLocalStorage();
    }

    function renderQuestions() {
        const container = document.getElementById('questionsArea');
        if (!container) return;
        container.innerHTML = '';
        questions.forEach((q, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-item';
            const qText = document.createElement('div');
            qText.className = 'q-text';
            qText.innerText = `${idx+1}. ${q.text}`;
            qDiv.appendChild(qText);
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            const labels = ['非常不同意', '不同意', '中立', '同意', '非常同意'];

                const radioId = `q_${idx}_${val}`;
                const label = document.createElement('label');
                label.className = 'option-label';
                label.htmlFor = radioId;
                label.innerText = labels[val-1];
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `question_${idx}`;
                radio.value = val;
                radio.id = radioId;
                radio.addEventListener('change', ((i, v) => () => setAnswer(i, v))(idx, val));
                optionsDiv.appendChild(radio);
                optionsDiv.appendChild(label);
                if (userAnswers[idx] === val) {
                    radio.checked = true;
                    label.classList.add('selected');
                }
            }
            qDiv.appendChild(optionsDiv);
            container.appendChild(qDiv);
        });
        updateProgressAndStats();
    }

    function computeScores() {
        let dimScores = { O: { raw:0, count:0 }, C: { raw:0, count:0 }, E: { raw:0, count:0 }, A: { raw:0, count:0 }, N: { raw:0, count:0 } };
        for (let i = 0; i < questions.length; i++) {
            const q = questions[i];
            let answer = userAnswers[i];
            if (answer === null) continue;
            let score = answer;
            if (q.reverse) score = 6 - answer;
            dimScores[q.dim].raw += score;
            dimScores[q.dim].count += 1;
        }
        let result = {};
        for (let dim of ['O','C','E','A','N']) {
            const cnt = dimScores[dim].count;
            if (cnt === 0) continue;
            const raw = dimScores[dim].raw;
            const min = cnt * 1;
            const max = cnt * 5;
            let norm = ((raw - min) / (max - min)) * 100;
            result[dim] = Math.round(Math.min(100, Math.max(0, norm)));
        }
        const stability = 100 - result.N;
        return { O: result.O, C: result.C, E: result.E, A: result.A, stability };
    }

    function getLevel(score) {
        if (score >= 70) return { text: "高 · 优势显著", class: "level-high" };
        if (score >= 40) return { text: "中 · 潜力可塑", class: "level-mid" };
        return { text: "低 · 待发展", class: "level-low" };
    }

    function getAdviceForDimension(dimKey, score) {
        const adviceMap = {
            E: score>=70 ? "社交活跃度突出：天生销售王者，善于破冰及客情维护，适合标杆顾问岗" : (score>=40 ? "外向性适中：基本沟通自然，刻意练习主动邀约可大幅提升业绩" : "内敛沉稳：适合技术型/深度服务岗，可搭配销售搭档发挥优势"),
            C: score>=70 ? "极致尽责：SOP执行者，服务品质标杆，店长储备人才" : (score>=40 ? "尽责性良好：基础规范扎实，建立清单习惯可晋升骨干" : "灵活随性：需加强服务流程意识，建议使用带教手册强化细节"),
            A: score>=70 ? "高共情天赋：让客户产生强情感链接，复购率之王" : (score>=40 ? "宜人性适中：平衡业绩与客户感受，能适应不同顾客" : "结果导向强：销售力度大，需加强同理心训练提升满意度"),
            O: score>=70 ? "好奇创新：热衷新技术成分，培训专家/项目研发潜力" : (score>=40 ? "开放度适中：可塑性强，定期学习激励可拓宽技能" : "偏好稳定：擅长标准执行，技术骨干最佳人选"),
            stability: score>=70 ? "情绪韧性极佳：抗压超群，能从容应对繁忙时段及客诉" : (score>=40 ? "情绪调节力中等：配备正向反馈环境，可稳定发挥" : "高敏感型：需安全感与鼓励式管理，谨慎高压岗位")
        };
        return adviceMap[dimKey] || "具备基础适应力，定向培养可提升";
    }

    function generateFiveFactorTable(scores, elapsedSec) {
        const dims = [
            { key: "E", name: "外向性 · 社交活力", score: scores.E },
            { key: "C", name: "尽责性 · 执行自律", score: scores.C },
            { key: "A", name: "宜人性 · 共情服务", score: scores.A },
            { key: "O", name: "开放性 · 好奇创新", score: scores.O },
            { key: "stability", name: "情绪稳定性 · 抗压韧劲", score: scores.stability }
        ];
        let rows = '';
        for (let d of dims) {
            const levelObj = getLevel(d.score);
            const advice = getAdviceForDimension(d.key, d.score);
            rows += `<tr>
                        <td style="font-weight:600;">${d.name}</td>
                        <td><strong>${d.score}</strong> 分</td>
                        <td><span class="level-badge ${levelObj.class}">${levelObj.text}</span></td>
                        <td style="text-align:left; font-size:0.8rem;">${advice}</td>
                     </tr>`;
        }
        const timeStr = formatTime(elapsedSec);
        return `<div style="margin-top:0.5rem;"><div class="timer-used">⏱️ 测评完成耗时：${timeStr}</div></div>
                <div class="results-table-wrapper">
                <table class="personality-table">
                    <thead>
                        <tr><th>核心人格维度</th><th>得分 (0-100)</th><th>等级评估</th><th>美肌适配建议</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                </div>`;
    }

    function getProfessionalInterpretation(scores) {
        const { O, C, E, A, stability } = scores;
        let traits = [];
        if (E >= 70) traits.push("🔥 社交活跃 · 天生美肌顾问明星，拓客与客情维护双优");
        else if (E >= 45) traits.push("📌 外向适中 · 能胜任日常沟通，再提升主动性能成为业绩标杆");
        else traits.push("🌿 内敛沉稳 · 适合高端深度服务型美肌岗位");
        if (C >= 70) traits.push("📋 尽责自律 · 细节控服务流程完美，客户信任度高");
        else if (C >= 45) traits.push("✅ 尽责性良好 · 有职业素养，优化服务标准可进阶");
        else traits.push("🌀 灵活随性 · 建议使用查核清单固化服务习惯");
        if (A >= 70) traits.push("❤️ 高同理心 · 客户粘性王者，适合高端VIP管家岗");
        else if (A >= 45) traits.push("🤝 宜人性适中 · 能兼顾门店业绩与温情服务");
        else traits.push("⚡ 结果导向型 · 销售爆发力强，注意共情训练提升复购");
        if (O >= 70) traits.push("💡 好奇创新 · 热衷新成分仪器，可发展为培训专家");
        else if (O >= 45) traits.push("📚 开放度中等 · 定期技术学习可拓展能力边界");
        else traits.push("🏛️ 偏好稳定 · 标准执行优秀骨干");
        if (stability >= 70) traits.push("🛡️ 情绪稳定 · 抗压王者，能胜任店务管理及棘手客诉");
        else if (stability >= 45) traits.push("🌊 情绪调节力中等 · 导师帮带潜力激发");
        else traits.push("🎭 高敏感型 · 需温暖氛围，可往技术深耕方向发展");
        
        let summary = "";
        if (E >= 60 && C >= 60 && stability >= 55) {
            summary = "🏆 高度适配「优秀美肌顾问」标杆画像！外向、尽责、抗压三核驱动，具备店长储备潜力。";
        } else if ((E >= 50 && A >= 60) || (C >= 65 && stability >= 50)) {
            summary = "🌟 基础条件优秀，通过系统带教可快速成为门店核心业绩骨干。";
        } else if (C < 40 && A < 40) {
            summary = "📌 服务规范与共情力待提升，建议强化职业素养训练，发挥其他潜能。";
        } else {
            summary = "✅ 具备美业可塑性，从技术顾问或助理岗起步，未来管理通道可期。";
        }
        return { detail: traits.join("； "), summary };
    }

    async function sendToBackend(scores, elapsedSec, summary, city, store, name) {
        const statusEl = document.getElementById('uploadStatus');
        statusEl.className = 'upload-status loading';
        statusEl.innerText = '📤 正在同步数据至总部后台...';
        statusEl.style.display = 'block';
        
        try {
            const res = await fetch(CLOUD_FUNCTION_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    scores,
                    city,
                    store,
                    name,
                    timeUsed: formatTime(elapsedSec),
                    summary,
                    deviceInfo: navigator.userAgent.substring(0, 200)
                })
            });
            const result = await res.json();
            if (result.success) {
                statusEl.className = 'upload-status success';
                statusEl.innerText = '✅ 数据已成功同步至总部后台';
            } else {
                throw new Error(result.error || '同步失败');
            }
        } catch (e) {
            console.error('上报异常:', e);
            statusEl.className = 'upload-status error';
            statusEl.innerText = '❌ 数据同步失败：' + e.message;
        }
    }

    function showResults() {
        const city = document.getElementById('userCity')?.value.trim();
        const store = document.getElementById('userStore')?.value.trim();
        const name = document.getElementById('userName')?.value.trim();
        
        if (!city || !store || !name) {
            alert('请填写城市、门店和姓名后再提交～');
            if (!city) document.getElementById('userCity')?.focus();
            else if (!store) document.getElementById('userStore')?.focus();
            else document.getElementById('userName')?.focus();
            return;
        }

        const unanswered = userAnswers.filter(v => v === null).length;
        if (unanswered > 0) {
            alert(`⏳ 还有 ${unanswered} 道题未完成，请完成全部60题后获取专业报告～`);
            const firstNull = userAnswers.findIndex(v => v === null);
            if (firstNull !== -1) {
                const items = document.querySelectorAll('.question-item');
                if (items[firstNull]) items[firstNull].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            return;
        }

        const scores = computeScores();
        const elapsedSec = getCurrentElapsedSeconds();

        const resultDiv = document.getElementById('resultContent');
        resultDiv.innerHTML = '';
        const dimensionsChart = [
            { name: "外向性 · 社交影响力", score: scores.E, color: "#b28b5e" },
            { name: "尽责性 · 服务执行力", score: scores.C, color: "#9c6e42" },
            { name: "宜人性 · 共情协作力", score: scores.A, color: "#c28a58" },
            { name: "开放性 · 学习创新力", score: scores.O, color: "#b07b47" },
            { name: "情绪稳定性 · 抗压复原力", score: scores.stability, color: "#8c5e35" }
        ];
        dimensionsChart.forEach(d => {
            const row = document.createElement('div');
            row.className = 'dimension-row';
            row.innerHTML = `<div class="dimension-name"><span>${d.name}</span><span><strong>${d.score}</strong> 分</span></div>
                             <div class="bar-bg"><div class="bar-fill" style="width: ${d.score}%; background: ${d.color};"></div></div>`;
            resultDiv.appendChild(row);
        });

        const tableHtml = generateFiveFactorTable(scores, elapsedSec);
        const tableArea = document.getElementById('tableResultArea');
        tableArea.innerHTML = tableHtml;
        
        const interp = getProfessionalInterpretation(scores);
        const interpretDiv = document.getElementById('interpretText');
        interpretDiv.innerHTML = `<strong>✨ 综合职业画像</strong><br>${interp.detail}<br><br>📌 核心建议：${interp.summary}<br><br>💡 本测评基于大五人格与美业百万数据校准，高尽责+高情绪稳定为胜任基础，高外向+高宜人性为销售服务双优基因。`;
        
        document.getElementById('resultCard').style.display = 'block';
        currentResultVisible = true;
        window.scrollTo({ top: document.getElementById('resultCard').offsetTop - 30, behavior: 'smooth' });

        sendToBackend(scores, elapsedSec, interp.summary, city, store, name);
    }

    function resetAssessment() {
        if (confirm('重置将清除所有答案、本地进度并重新计时。确定重新测评吗？')) {
            userAnswers = new Array(questions.length).fill(null);
            saveToLocalStorage();
            renderQuestions();
            document.getElementById('resultCard').style.display = 'none';
            currentResultVisible = false;
            document.getElementById('uploadStatus').style.display = 'none';
            document.getElementById('userCity').value = '';
            document.getElementById('userStore').value = '';
            document.getElementById('userName').value = '';
            updateProgressAndStats();
            resetTimer();
        }
    }

    function init() {
        loadFromLocalStorage();
        renderQuestions();
        document.getElementById('submitBtn').addEventListener('click', showResults);
        document.getElementById('resetBtn').addEventListener('click', resetAssessment);
    }
    init();
</script>
